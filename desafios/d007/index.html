<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens Flexível</title>
</head>

<body>
    <h1>Imagens Flexíveis</h1>
    <p>Você está vendo uma imagem no tamanho real, aumente a janela do seu navegador para ter uma melhor experiência 😎.
    </p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/paisagem-p.png">
        <source media="(max-width: 1210px)" srcset="imagens/paisagem-m.png">
        <img src="imagens/paisagem-g.png" alt="paisagem-big">
    </picture>
</body>

</html>
