<!DOCTYPE html>
<html lang="pr-bt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 2.0em;
        }
        div > p{
            display: none;
        }
        div:hover > p{
            background-color: red;
            display: block;
            color: white;
            width: 300px;
        }
        div:hover{
            color: red;
        }
    </style>
</head>

<body>
    <h1>Testando o Hover</h1>
    <p>Passe o mouse sobre o Texto abaixo</p>
    <div>
        Passe o mouse aqui
        <p>Texto Escondido</p>
    </div>
    <p>Fim do Exemplo</p>
</body>

</html>
