<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posicionamento Central</title>
    <style>
        #container{
            background-image: url(imagens/target001.png);
            background-color: rgb(63, 255, 252);
            background-size: 100% 100%;
            height: 95vh;
            border: 2px dashed;
        }
        #content {
            background-image: url(imagens/target001.png);
            background-size: 100% 100%;
            background-color: rgb(17, 0, 255);
            width: 200px;
            height: 200px;
            border: 2px solid;
            position: absolute;
            transform: translate(-50%, -50%);
            top: 50%;
            left: 50%;
        }
    </style>
</head>
<body>
    <section id="container">
        <article id="content">

        </article>
    </section>
</body>
</html>
